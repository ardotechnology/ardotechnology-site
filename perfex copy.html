<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
        body {
            background-color: #f6f6f6;
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.4;
            margin: 0;
            padding: 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        td {
            font-family: sans-serif;
            font-size: 14px;
            vertical-align: top;
        }

        .body {
            background-color: #f7f4f5;
            width: 100%;
        }

        .container {
            display: block;
            margin: 0 auto;
            max-width: 680px;
            padding: 0;
            width: 100%;
        }

        .content {
            display: block;
            margin: 0 auto;
            max-width: 680px;
            padding: 0;
        }

        .main {
            background: #fff;
            border-radius: 3px;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .main img {
            display: block;
            width: 100%;
            height: auto;
            margin: 0;
        }

        .header {
            background: #02abee00;
            padding: 4px 0;
            text-align: center;
        }

        .footer {
            background-color: #032642;
            color: #fff;
            font-size: 10px;
            text-align: center;
            padding: 20px 0;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            margin: 0 5px;
        }

        .footer ul {
            padding: 0;
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0 0;
        }

        .additional-content {
            padding: 0 50px;
            box-sizing: border-box;
            /* Ensures padding doesn't push the content out of the container */
        }

        .additional-content-inner {
            padding: 10px 0;
            /* Add padding inside the content */
        }

        @media only screen and (max-width: 620px) {
            .container {
                width: 100% !important;
                padding: 0 !important;
            }

            .main {
                border-radius: 0 !important;
            }

            .additional-content {
                padding: 0 20px;
                /* Adjust padding for smaller screens */
            }
        }
    </style>
</head>

<body>
    <table class="body">
        <tr>
            <td></td>
            <td class="container">
                <div class="content">
                    <!-- Header -->
                    <table class="header">
                        <tr>
                            <td>
                                <img src="https://ardo.technology/documentos/images/logo_blue.png" width="90"
                                    height="33" alt="ARDO Technology" style="padding: 4px 0;">
                            </td>
                        </tr>
                    </table>

                    <!-- Main Content -->
                    <table class="main">
                        <tr>
                            <td style="padding: 0;">
                                <img src="https://ardo.technology/documentos/images/banner1.png" alt="Banner">
                            </td>
                        </tr>
                        <tr>
                            <td class="additional-content">
                                <div class="additional-content-inner">

                                    <!--Aquí comienza el Header-->
                                    <!--aquí se inserta el contenido del correo-->
                                    <!--Aquí comienza el footer-->
                            </td>
                        </tr>
                    </table>

                    <!-- Footer -->
                    <div class="footer">
                        <span>Av. Antea 1088 Piso 3 Col. Jurica, Querétaro, Qro. 76100</span>
                        <ul>
                            <li><a href="https://ardo.technology/privacidad/">Aviso Privacidad</a></li>
                            <li><a href="https://ardo.technology/tyc-voip/">Términos y Condiciones</a></li>
                            <li><a href="https://ardo.technology/soporte-tecnico/">Soporte Técnico</a></li>
                        </ul>
                    </div>
                </div>
            </td>
            <td></td>
        </tr>
    </table>
</body>

</html>
